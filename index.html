<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./index.css">
</head>
<body>
    <div class="main">
        <div class="content">
            <div class="radio-Bar">
                <h2 class="title">Calc</h2>
                <div class="theme">
                    <h4 class="them">Theme</h4>
                    <div class="switch">
                        <label class="label"> 1 </label>
                        <label class="label"> 2 </label>
                        <label class="label"> 3 </label>
                        <input name="switch" type="radio" class="radio1" checked/>    
                        <input name="switch" type="radio" class="radio2"/>    
                        <input name="switch" type="radio" class="radio3"/>        
                    </div>
                </div>
            </div>
            <div class="display"> 0 </div>
            <div class="key">
                <div class="first">
                    <button class="keys num"> 7 </button>
                    <button class="keys num"> 8 </button>
                    <button class="keys num"> 9 </button>
                    <button class="keys back" style="color:white"> C </button>  
                </div>
                <div class="first">
                    <button class="keys num"> 4 </button>
                    <button class="keys num"> 5 </button>
                    <button class="keys num"> 6 </button>
                    <button class="keys num"> + </button>
                </div>
                <div class="first">
                    <button class="keys num"> 1 </button>
                    <button class="keys num"> 2 </button>
                    <button class="keys num"> 3 </button>  
                    <button class="keys num"> - </button>
                </div>

                <div class="first">
                    <button class="keys num"> . </button>
                    <button class="keys zero num"> 0 </button>
                    <button class="keys num"> &divide; </button>  
                    <button class="keys num"> x </button>
                </div>    
                <div class="first">
                <button class="keys reset" style="color:white"> AC </button>
                <button class="keys operator calcu" style="color:white"> = </button>
                </div>
            </div>
        </div>
      </div>
    <script src="./index.js"></script>
</body>
</html>
